<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <title>My App</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <meta name="description" content="My mobile web app" />
    <meta name="theme-color" content="#111111" />

    <link rel="manifest" href="./manifest.json" />

    <!-- Icons -->
    <link rel="icon" href="./icons/icon-32.png" sizes="32x32" />
    <link rel="icon" href="./icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My App" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="./css/config.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/quick-actions.css">
    <link rel="stylesheet" href="./css/skema.css">
    <link rel="stylesheet" href="./css/roadmap.css">
    <link rel="stylesheet" href="./css/log-workout-modal.css">

    <link rel="stylesheet" href="./css/roller.css">
    <link rel="stylesheet" href="./css/touch-effect.css">

    <script src="./js/storage.js"></script>
</head>

<body>
    <main>
        <div id="bg">
            <div id="info-bar">
                <div id="date-info">
                    <label id="date-label">Dato</label>
                    <label id="date">Tirsdag d. 3 Marts</label>
                </div>
                <div id="streak-info">
                    <label id="streak-label">🔥 Streak</label>
                    <label id="streak">16 dage</label>
                </div>
            </div>
            <p id="animal-text">Dit dyr er..</p>
            <div id="big-glow"></div>
            <div id="glow"></div>
            <div id="animal">🦥</div>
            <h1 id="animal-title">DOVENDYRET</h1>
            <p id="info-text">Du er i gang – og det er det vigtigste.</p>
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <label id="progress-label">Næste udvikling: 2/5</label>
            <button id="log-workout-btn" draggable onclick="showLogModal()">Registrer træning</button>
        </div>
        <div id="content">
            <section id="quick-actions-section">
                <div id="quick-stats-row">
                    <div class="stat" draggable>
                        <h3 id="call-to-action-stat-title">Sidste træning</h3>
                        <span id="call-to-action-stat-val" class="stat-value">2 dage</span>
                    </div>
                    <div class="stat" draggable>
                        <h3 id="avg-duration-stat-title">Gns. varighed</h3>
                        <span id="avg-duration-stat-val" class="stat-value">18 min</span>
                    </div>
                </div>
            </section>
            <section id="skema-section">
                <h2>Skema</h2>
                <div class="week">

                </div>
            </section>
            <section id="roadmap-section">
                <h2 draggable>Roadmap</h2>
                <ul class="roadmap">
                    <li class="mission" onclick="setCompleted(this.parentElement, 1)">
                        <h3>Mission title</h3>
                        <p>Mission text</p>
                    </li>
                    <li class="mission" onclick="setCompleted(this.parentElement, 2)">
                        <h3>Mission title</h3>
                        <p>Mission text</p>
                    </li>
                    <li class="mission" onclick="setCompleted(this.parentElement, 3)">
                        <h3>Mission title</h3>
                        <p>Mission text</p>
                    </li>
                </ul>
            </section>
        </div>
    </main>

    <div id="log-workout-modal-outside" onclick="hideLogModal()"></div>
    <div id="log-workout-modal" class="">
        <h2>Registrer træning</h2>
        <div id="time-row">
            <div id="start-container" draggable>
                <span class="label">Start tidspunkt</span>
                <div class="flex-row">
                    <span id="hour-roller" class="roller"></span>
                    <span id="spacer">:</span>
                    <span id="minute-roller" class="roller"></span>
                </div>
            </div>
            <div id="duration-container" draggable>
                <span class="label">Varighed</span>
                <div class="flex-row">
                    <span id="duration-roller" class="roller"></span>
                    <span id="suffix">min</span>
                </div>
            </div>
        </div>
        <button id="log-btn" draggable>Registrer</button>
    </div>
    <script>
    (() => {
        const hour_roller = document.querySelector('#hour-roller')
        const minute_roller = document.querySelector('#minute-roller')
        const duration_roller = document.querySelector('#duration-roller')

        const now = new Date()

        for (let i = 0; i <= 23; i++) {
            initial = ''
            if (i === now.getHours()) initial = 'initial'
            hour_roller.innerHTML += `<span ${initial} data-val="${String(i).padStart(2, '0')}" class="option">${String(i).padStart(2, '0')}</span>`
        }
        for (let i = 0; i <= 59; i++) {
            initial = ''
            if (i === now.getMinutes()) initial = 'initial'
            minute_roller.innerHTML += `<span ${initial} data-val="${String(i).padStart(2, '0')}" class="option">${String(i).padStart(2, '0')}</span>`
        }
        for (let i = 0; i <= 90; i++) {
            initial = ''
            if (i === 15) initial = 'initial'
            duration_roller.innerHTML += `<span ${initial} data-val="${String(i)}" class="option">${String(i)}</span>`
        }
    })()
    </script>

    <script src="./js/index.js"></script>
    <script src="./js/roadmap.js"></script>
    <script src="./js/log-workout.js"></script>

    <script src="./js/roller.js"></script>
    <script src="./js/touch-effect.js"></script>
</body>
</html>
