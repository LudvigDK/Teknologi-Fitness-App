<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <title>My App</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <meta name="description" content="My mobile web app" />
    <meta name="theme-color" content="#111111" />

    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Icons -->
    <link rel="icon" href="/icons/favicon-32.png" sizes="32x32" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My App" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="./css/config.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/skema.css">
    <link rel="stylesheet" href="./css/roadmap.css">

    <link rel="stylesheet" href="./css/touch-effect.css">
</head>

<body>
    <main>
        <div id="bg">
            <div id="circle"></div>
            <div id="glow"></div>
            <div id="animal">🦥</div>
            <h1 id="animal-title">SLOTH</h1>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
        <div id="content">
            <section id="skema-section">
                <h2>Skema</h2>
                <div class="week">

                </div>
            </section>
            <section id="roadmap-section">
                <h2 draggable>Roadmap</h2>
                <ul class="roadmap">
                    <li class="mission" onclick="setCompleted(this.parentElement, 1)">
                        <h3>Mission title</h3>
                        <p>Mission text</p>
                    </li>
                    <li class="mission" onclick="setCompleted(this.parentElement, 2)">
                        <h3>Mission title</h3>
                        <p>Mission text</p>
                    </li>
                    <li class="mission" onclick="setCompleted(this.parentElement, 3)">
                        <h3>Mission title</h3>
                        <p>Mission text</p>
                    </li>
                </ul>
            </section>
        </div>
    </main>

    <script src="./js/index.js"></script>
    <script src="./js/roadmap.js"></script>

    <script src="./js/touch-effect.js"></script>
</body>
</html>
