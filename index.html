    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC05n81RatYa69u-Ya0NHTcCXXiHU5T_y4",
            authDomain: "teknologi-fitness-app.firebaseapp.com",
            projectId: "teknologi-fitness-app",
            storageBucket: "teknologi-fitness-app.firebasestorage.app",
            messagingSenderId: "234958831774",
            appId: "1:234958831774:web:ec6555a8c7e81ed74a3b8f"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        let allow_btn = document.createElement('btn')
        allow_btn.id = 'noti_allow_btn'

        async function enablePush() {

            allow_btn.remove()

            const permission = await Notification.requestPermission();

            if (permission !== "granted") {
                console.log("Notifications denied");
                return;
            }

            const registration = await navigator.serviceWorker.register("./workers/firebase-messaging-sw.js");

            const token = await getToken(messaging, {
                vapidKey: "BOPjv9OudBt-O7yaTgsKc_IANXljy-LhwlvN_Dpzrvq_A-jU3S6u5S-p-a4JC16sk4RoitPzmWjqKv44j6v8nK0",
                serviceWorkerRegistration: registration
            });

            console.log("FCM TOKEN:", token);

            // save token to your database / server
        }

        document.body.appendChild(allow_btn)
        allow_btn.addEventListener('click', enablePush)

        onMessage(messaging, (payload) => {
            console.log("Foreground message:", payload);
        });
    </script>

    <div id="log-workout-modal" class="">
        <h2>Registrer træning</h2>
        <div id="time-row">
            <div id="start-container" draggable>
                <span class="label">Start tidspunkt</span>
                <div class="flex-row">
                    <span id="hour-roller" class="roller"></span>
                    <span id="spacer">:</span>
                    <span id="minute-roller" class="roller"></span>
                </div>
            </div>
            <div id="duration-container" draggable>
                <span class="label">Varighed</span>
                <div class="flex-row">
                    <span id="duration-roller" class="roller"></span>
                    <span id="suffix">min</span>
                </div>
            </div>
        </div>
        <button id="log-btn" draggable>Registrer</button>
    </div>
    <script>
    (() => {
        const hour_roller = document.querySelector('#hour-roller')
        const minute_roller = document.querySelector('#minute-roller')
        const duration_roller = document.querySelector('#duration-roller')

        const now = new Date()

        for (let i = 0; i <= 23; i++) {
            initial = ''
            if (i === now.getHours()) initial = 'initial'
            hour_roller.innerHTML += `<span ${initial} data-val="${String(i).padStart(2, '0')}" class="option">${String(i).padStart(2, '0')}</span>`
        }
        for (let i = 0; i <= 59; i++) {
            initial = ''
            if (i === now.getMinutes()) initial = 'initial'
            minute_roller.innerHTML += `<span ${initial} data-val="${String(i).padStart(2, '0')}" class="option">${String(i).padStart(2, '0')}</span>`
        }
        for (let i = 15; i <= 180; i++) {
            initial = ''
            if (i === 15) initial = 'initial'
            duration_roller.innerHTML += `<span ${initial} data-val="${String(i)}" class="option">${String(i)}</span>`
        }
    })()
    </script>
